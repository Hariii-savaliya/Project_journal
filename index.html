<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div>
          <h1 class="logo">Journal</h1>
          <p class="tagline">Capture your thoughts, one entry at a time.</p>
        </div>
        <button type="button" class="theme-toggle" id="theme-toggle">Dark mode</button>
      </div>
    </header>

    <main class="main">
      <section class="entry-form">
        <h2 class="section-title" id="form-title">New Entry</h2>
        <form id="journal-form">
          <div class="field">
            <label for="entry-title">Title</label>
            <input
              type="text"
              id="entry-title"
              placeholder="Give your entry a title..."
              autocomplete="off"
              required
            >
          </div>
          <div class="field">
            <label for="entry-tags">Tags</label>
            <input
              type="text"
              id="entry-tags"
              placeholder="Add comma-separated tags, e.g. work, personal, ideas"
              autocomplete="off"
            >
          </div>
          <div class="field">
            <label for="entry-text">Entry</label>
            <textarea
              id="entry-text"
              placeholder="What's on your mind today?"
              rows="6"
              required
            ></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-save" id="save-entry-btn">Save Entry</button>
            <button type="button" class="btn-cancel hidden" id="cancel-edit-btn">Cancel Edit</button>
          </div>
        </form>
      </section>

      <section class="entries-section">
        <h2 class="section-title">Your Entries</h2>
        <div class="entries-toolbar">
          <label class="toolbar-field">
            <span>Search</span>
            <input
              type="search"
              id="search-input"
              placeholder="Search title or entry text..."
              autocomplete="off"
            >
          </label>
          <label class="toolbar-field">
            <span>Filter by tag</span>
            <select id="tag-filter">
              <option value="">All tags</option>
            </select>
          </label>
        </div>
        <ul id="entries-list" class="entries-list"></ul>
        <p id="empty-state" class="empty-state">No entries yet. Write your first one above.</p>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
